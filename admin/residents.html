<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0c0a09" />
  <title>Residents · Admin · Sunset Penthouse</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..700,30..100;1,9..144,300..700,30..100&family=Geist+Mono:wght@400;500&family=Geist:wght@300;400;500;600&display=swap" />
  <link rel="stylesheet" href="/assets/styles.css?v=8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
</head>
<body class="page">

  <main class="page__container">
    <header class="page-header rise delay-1">
      <span class="page-header__kicker">Admin · Residents</span>
      <h1 class="page-header__title">Who's in the building.</h1>
      <p class="page-header__sub">
        Approve pending signups, promote board members, remove old
        residents. New accounts are created on signup; you only manage
        them from here.
      </p>
    </header>

    <section id="resList" class="admin-list" aria-live="polite">
      <div class="empty"><div class="empty__title">Loading…</div></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/env.js"></script>
  <script src="/assets/supabase-client.js"></script>
  <script src="/assets/admin-guard.js"></script>
  <script src="/assets/page-shell.js?v=7"></script>
  <script src="/assets/dom.js"></script>
  <script>
    (async () => {
      const list = document.getElementById('resList');
      const { data: { session } } = await window.sb.auth.getSession();
      if (!session) return;
      const meId = session.user.id;

      const updateRole = async (id, role) => {
        const { error } = await window.sb
          .from('profiles').update({ role }).eq('id', id);
        if (error) alert('Couldn\u2019t update: ' + error.message);
      };
      const sendWelcome = async (profileId) => {
        try {
          const res = await fetch(
            `${window.ENV.SUPABASE_URL}/functions/v1/send_welcome_email`,
            {
              method: 'POST',
              headers: {
                'Authorization': 'Bearer ' + session.access_token,
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({ profile_id: profileId }),
            },
          );
          if (!res.ok) {
            const txt = await res.text();
            alert('Approved \u2014 welcome email didn\u2019t send: ' + txt.slice(0, 140));
          }
        } catch (e) {
          alert('Approved \u2014 welcome email didn\u2019t send: ' + (e?.message || e));
        }
      };
      // Tries to fully delete the user (frees the email). Falls back to a
      // soft status='removed' if the user has authored content that the DB
      // won't let us delete. Returns the mode the server used, or null on error.
      const deleteUser = async (profileId) => {
        try {
          const res = await fetch(
            `${window.ENV.SUPABASE_URL}/functions/v1/admin_delete_user`,
            {
              method: 'POST',
              headers: {
                'Authorization': 'Bearer ' + session.access_token,
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({ profile_id: profileId }),
            },
          );
          const text = await res.text();
          let payload = {};
          try { payload = text ? JSON.parse(text) : {}; } catch (_) { /* non-JSON error body */ }
          if (!res.ok || !payload.ok) {
            const detail = payload.detail || payload.reason || text || `HTTP ${res.status}`;
            console.error('admin_delete_user failed', res.status, text);
            alert('Couldn\u2019t remove (' + res.status + '): ' + detail);
            return null;
          }
          if (payload.mode === 'soft_remove') {
            alert('Kept as removed because this person already posted content. They\u2019re hidden from the list.');
          }
          return payload.mode;
        } catch (e) {
          console.error('admin_delete_user error', e);
          alert('Couldn\u2019t remove: ' + (e?.message || e));
          return null;
        }
      };

      const load = async () => {
        const { data: raw, error } = await window.sb
          .from('profiles')
          .select('id, full_name, unit_number, phone, role, status, created_at')
          .neq('status', 'removed')
          .order('status', { ascending: true })
          .order('unit_number', { ascending: true });

        if (error) {
          mount(list,
            el('div', { class: 'empty' },
              el('div', { class: 'empty__title', text: 'Trouble loading residents' }),
              el('p', { class: 'empty__sub', text: error.message }),
            ));
          return;
        }

        // Load candidate roster rows for pending signups in one batch.
        const pendingUnits = Array.from(new Set(
          (raw || []).filter((r) => r.status === 'pending').map((r) => r.unit_number).filter(Boolean),
        ));
        let candidatesByUnit = new Map();
        if (pendingUnits.length > 0) {
          const { data: cands, error: cErr } = await window.sb
            .from('residents')
            .select('id, unit_number, display_name, phone, profile_id')
            .in('unit_number', pendingUnits)
            .is('profile_id', null)
            .order('sort_order', { ascending: true });
          if (cErr) { console.error('residents candidates load failed', cErr); }
          (cands || []).forEach((c) => {
            if (!candidatesByUnit.has(c.unit_number)) candidatesByUnit.set(c.unit_number, []);
            candidatesByUnit.get(c.unit_number).push(c);
          });
        }

        const data = raw || [];
        if (data.length === 0) {
          mount(list,
            el('div', { class: 'empty' },
              el('div', { class: 'empty__title', text: 'No residents yet' }),
              el('p', { class: 'empty__sub', text: 'Once people sign up, they\u2019ll appear here.' }),
            ));
          return;
        }

        // Sort: pending first, then approved.
        const order = { pending: 0, approved: 1 };
        data.sort((a, b) => (order[a.status] - order[b.status]));

        const normalizeName = (s) => String(s || '').toLowerCase().replace(/[^a-z ]/g, ' ').replace(/\s+/g, ' ').trim();
        const nameScore = (signup, candidate) => {
          const a = normalizeName(signup), b = normalizeName(candidate);
          if (!a || !b) return 0;
          if (a === b) return 1.0;
          const aToks = a.split(' '), bToks = b.split(' ');
          const aLast = aToks[aToks.length - 1], bLast = bToks[bToks.length - 1];
          if (aLast === bLast && aToks[0] && bToks[0] && (aToks[0].startsWith(bToks[0]) || bToks[0].startsWith(aToks[0]))) {
            return 0.8;
          }
          const set = new Set(bToks);
          const overlap = aToks.filter((t) => set.has(t)).length;
          return overlap / Math.max(aToks.length, bToks.length);
        };
        const pickBestCandidate = (signup, candidates) => {
          if (!candidates || candidates.length === 0) return null;
          let best = null, bestScore = 0;
          for (const c of candidates) {
            const s = nameScore(signup.full_name, c.display_name);
            if (s > bestScore) { best = c; bestScore = s; }
          }
          return bestScore >= 0.7 ? best : null;
        };

        const rows = data.map((r) => {
          const isMe = r.id === meId;
          let candidatesBlock = null;
          const statusPill = el('span', {
            class: 'admin-status-pill admin-status-pill--' + r.status,
            text: r.status,
          });
          const rolePill = r.role === 'admin'
            ? el('span', { class: 'admin-status-pill admin-status-pill--admin', text: 'admin' })
            : null;

          const actions = [];
          if (r.status === 'pending') {
            const unitCandidates = candidatesByUnit.get(r.unit_number) || [];
            const preSelected = pickBestCandidate(r, unitCandidates);
            // Per-row radio group name (avoids collisions between cards).
            const radioName = `roster_${r.id}`;

            const candidateChoices = unitCandidates.map((c) =>
              el('label', { class: 'admin-candidate' },
                el('input', {
                  type: 'radio', name: radioName, value: c.id,
                  checked: preSelected && preSelected.id === c.id,
                }),
                el('span', { text: c.display_name }),
              )
            );
            // Pre-select "Create new" only when there are no candidates at all.
            // When candidates exist but none match well enough, leave nothing
            // selected so the admin picks consciously.
            candidateChoices.push(
              el('label', { class: 'admin-candidate' },
                el('input', {
                  type: 'radio', name: radioName, value: '__new__',
                  checked: !preSelected && unitCandidates.length === 0,
                }),
                el('span', { text: '+ Create new roster entry' }),
              )
            );

            candidatesBlock = el('div', { class: 'admin-candidates' },
              el('div', { class: 'admin-candidates__label', text: `Roster matches for Unit ${r.unit_number || '—'}:` }),
              ...candidateChoices,
            );

            actions.push(el('button', {
              class: 'btn-mini', type: 'button', text: 'Approve & Link',
              onclick: async () => {
                const picked = document.querySelector(`input[name="${radioName}"]:checked`);
                if (!picked) { alert('Pick a roster match, or choose Create new.'); return; }
                const residentId = picked.value !== '__new__' ? picked.value : null;
                const { error: rpcErr } = await window.sb.rpc('approve_and_link', {
                  p_profile_id:  r.id,
                  p_resident_id: residentId,
                  p_phone:       r.phone || null,
                });
                if (rpcErr) { alert('Couldn\u2019t approve: ' + rpcErr.message); return; }
                sendWelcome(r.id); // fire-and-forget, matches prior behavior
                load();
              },
            }));
            actions.push(el('button', {
              class: 'btn-mini btn-mini--danger', type: 'button', text: 'Reject',
              onclick: async () => {
                if (!confirm('Reject ' + (r.full_name || 'this signup') + '? This deletes their account; the email can be used again.')) return;
                await deleteUser(r.id);
                load();
              },
            }));
          } else if (r.status === 'approved') {
            if (!isMe) {
              if (r.role === 'admin') {
                actions.push(el('button', {
                  class: 'btn-mini', type: 'button', text: 'Demote',
                  onclick: async () => {
                    if (!confirm('Remove admin from ' + (r.full_name || 'this user') + '?')) return;
                    await updateRole(r.id, 'resident');
                    load();
                  },
                }));
              } else {
                actions.push(el('button', {
                  class: 'btn-mini', type: 'button', text: 'Make admin',
                  onclick: async () => {
                    if (!confirm('Make ' + (r.full_name || 'this user') + ' an admin?')) return;
                    await updateRole(r.id, 'admin');
                    load();
                  },
                }));
              }
              actions.push(el('button', {
                class: 'btn-mini btn-mini--danger', type: 'button', text: 'Remove',
                onclick: async () => {
                  if (!confirm('Remove ' + (r.full_name || 'this resident') + ' from the building? They\u2019ll lose access.')) return;
                  await deleteUser(r.id);
                  load();
                },
              }));
            } else {
              actions.push(el('span', { class: 'admin-row__meta', text: 'You' }));
            }
          }

          return el('article', { class: 'card liquid-glass admin-row' },
            el('div', { class: 'admin-row__main' },
              el('div', { class: 'admin-row__title', text: (r.full_name || 'Unnamed') + (r.unit_number ? ' · Unit ' + r.unit_number : '') }),
              el('div', { class: 'admin-row__meta' },
                statusPill,
                rolePill,
                r.phone ? el('span', { text: r.phone }) : null,
              ),
              candidatesBlock,
            ),
            el('div', { class: 'admin-row__actions' }, ...actions),
          );
        });

        mount(list, ...rows);
      };

      load();
    })();
  </script>
</body>
</html>
