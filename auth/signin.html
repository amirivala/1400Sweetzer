<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0c0a09" />
  <title>Sign in · Sunset Penthouse</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..700,30..100;1,9..144,300..700,30..100&family=Geist+Mono:wght@400;500&family=Geist:wght@300;400;500;600&display=swap" />
  <link rel="stylesheet" href="/assets/styles.css?v=8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
</head>
<body class="auth-shell">

  <div class="auth-card liquid-glass-strong rise delay-2">
    <div class="auth-brand">
      <span class="mark liquid-glass-strong"><span aria-hidden="true">SP</span></span>
      <span class="auth-brand-name">Sunset Penthouse</span>
    </div>

    <h1 class="auth-title">Sign in.</h1>
    <p class="auth-sub">A one-tap link will arrive in your inbox. No password to remember.</p>

    <form id="signinForm" novalidate>
      <div class="field">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="you@example.com"
          required
          autocomplete="email"
          autofocus
        />
      </div>

      <button type="submit" class="cta cta--auth">
        <span>Send the magic link</span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M7 17L17 7"/><path d="M7 7h10v10"/>
        </svg>
      </button>
    </form>

    <p id="status" class="auth-status" role="status"></p>

    <p class="auth-foot">
      Not a resident yet? <a href="/signup.html">Request access</a>
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/env.js"></script>
  <script src="/assets/supabase-client.js"></script>
  <script>
    const form = document.getElementById('signinForm');
    const status = document.getElementById('status');
    const button = form.querySelector('button[type="submit"]');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      if (!email) return;

      button.disabled = true;
      button.style.opacity = '0.6';
      status.textContent = 'Sending…';

      const { error } = await window.sb.auth.signInWithOtp({
        email,
        options: {
          emailRedirectTo: `${location.origin}/auth/callback.html`,
          shouldCreateUser: false,
        },
      });

      button.disabled = false;
      button.style.opacity = '';

      if (error) {
        // Supabase returns a generic "Signups not allowed for otp" when
        // shouldCreateUser is false and the email isn't registered.
        const msg = /signups? not allowed/i.test(error.message || '')
          ? "No account for that email. If you're new, request access first."
          : `Couldn't send: ${error.message}`;
        status.textContent = msg;
      } else {
        status.textContent = `Sent. Check your inbox at ${email}.`;
        button.querySelector('span').textContent = 'Sent ✓';
      }
    });
  </script>
</body>
</html>
