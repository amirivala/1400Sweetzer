<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f5f0e6" />
  <title>Signing you in…</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..700,30..100;1,9..144,300..700,30..100&family=Geist+Mono:wght@400;500&family=Geist:wght@300;400;500;600&display=swap" />
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body class="auth-shell">

  <div class="auth-card fade">
    <div class="plaque">
      <span class="plaque__num">1400</span>
      <span class="plaque__rule"></span>
      <span class="plaque__name">Sweetzer</span>
    </div>
    <h1 class="auth-title">One moment…</h1>
    <p id="status" class="auth-sub" role="status">Verifying your magic link.</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/env.js"></script>
  <script src="/assets/supabase-client.js"></script>
  <script>
    (async () => {
      const status = document.getElementById('status');

      // Give supabase-js a tick to consume the URL hash.
      await new Promise((r) => setTimeout(r, 50));

      const { data: { session } } = await window.sb.auth.getSession();
      if (!session) {
        status.textContent = "We couldn't verify that link. Try signing in again.";
        setTimeout(() => (location.href = '/auth/signin.html'), 1800);
        return;
      }

      const { data: profile, error } = await window.sb
        .from('profiles')
        .select('status')
        .eq('id', session.user.id)
        .single();

      if (error || !profile) {
        location.href = '/';
        return;
      }

      if (profile.status === 'approved') {
        status.textContent = "You're in. Taking you home…";
        setTimeout(() => (location.href = '/home.html'), 350);
      } else if (profile.status === 'pending') {
        await window.sb.auth.signOut();
        status.textContent = "You're on the list. A board member will approve you shortly.";
      } else {
        await window.sb.auth.signOut();
        status.textContent = "Your account is no longer active.";
      }
    })();
  </script>
</body>
</html>
