<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0c0a09" />
  <title>Post · Sunset Penthouse</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..700,30..100;1,9..144,300..700,30..100&family=Geist+Mono:wght@400;500&family=Geist:wght@300;400;500;600&display=swap" />
  <link rel="stylesheet" href="/assets/styles.css?v=8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
</head>
<body class="page">

  <main class="page__container">
    <article class="article rise delay-1">
      <a class="article__back" href="/news.html">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/>
        </svg>
        All news
      </a>
      <div id="content">
        <p style="color: var(--paper-mute);">Loading…</p>
      </div>
    </article>
  </main>

  <!-- DOMPurify for sanitizing the rich-text body before it's
       attached to the DOM. Loaded before dom.js so renderRichText
       can use it. -->
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/env.js"></script>
  <script src="/assets/supabase-client.js"></script>
  <script src="/assets/auth-guard.js"></script>
  <script src="/assets/page-shell.js?v=7"></script>
  <script src="/assets/dom.js"></script>
  <script>
    (async () => {
      const content = document.getElementById('content');
      const id = new URLSearchParams(location.search).get('id');

      const notFound = (msg) => {
        document.title = 'Not found · Sunset Penthouse';
        mount(content,
          el('h1', { class: 'article__title', text: 'Post not found' }),
          el('p', { style: { color: 'var(--paper-mute)' }, text: msg }));
      };

      if (!id) {
        notFound('This link is missing a post id.');
        return;
      }

      const { data: post, error } = await window.sb
        .from('news_posts')
        .select(`
          id, title, body, cover_image_url, published_at, created_at,
          author:profiles!author_id ( full_name )
        `)
        .eq('id', id)
        .eq('published', true)
        .single();

      if (error || !post) {
        notFound('It may have been removed or you may not have access.');
        return;
      }

      document.title = `${post.title} · Sunset Penthouse`;
      const author = post.author?.full_name || 'The board';

      const cover = post.cover_image_url
        ? el('div', { class: 'article__cover' },
            el('img', { src: post.cover_image_url, alt: '', loading: 'eager' }))
        : null;

      const body = el('div', { class: 'article__body' });
      // post.body is rich-text HTML written by an admin via Quill.
      // We pass it through DOMPurify (RETURN_DOM_FRAGMENT) so even if
      // the input contained <script> or onclick it gets stripped.
      body.appendChild(renderRichText(post.body));

      const dateIso = post.published_at || post.created_at;
      mount(content,
        el('div', { class: 'article__meta' },
          el('time', {
            datetime: dateIso,
            text: fmt.longDate(dateIso),
          }),
        ),
        el('h1', { class: 'article__title', text: post.title }),
        cover,
        body,
        el('div', { class: 'article__byline', text: '— ' + author }),
      );
    })();
  </script>
</body>
</html>
