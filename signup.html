<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0c0a09" />
  <title>Request access · Sunset Penthouse</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..700,30..100;1,9..144,300..700,30..100&family=Geist+Mono:wght@400;500&family=Geist:wght@300;400;500;600&display=swap" />
  <link rel="stylesheet" href="/assets/styles.css?v=8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
</head>
<body class="auth-shell">

  <div class="auth-card liquid-glass-strong rise delay-2">
    <div class="auth-brand">
      <span class="mark liquid-glass-strong"><span aria-hidden="true">SP</span></span>
      <span class="auth-brand-name">Sunset Penthouse</span>
    </div>

    <h1 class="auth-title">Request access.</h1>
    <p class="auth-sub">A board member will approve your account. You'll get an email when you're in.</p>

    <form id="signupForm" novalidate>
      <div class="field">
        <label for="full_name">Full name</label>
        <input type="text" id="full_name" required autocomplete="name" placeholder="Your name" />
      </div>
      <div class="field">
        <label for="unit_number">Unit</label>
        <input type="text" id="unit_number" required placeholder="e.g. 4B" maxlength="20" />
      </div>
      <div class="field">
        <label for="phone">Phone</label>
        <input type="tel" id="phone" required autocomplete="tel" placeholder="(555) 123-4567" maxlength="40" />
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" required autocomplete="email" placeholder="you@example.com" />
      </div>

      <button type="submit" class="cta cta--auth">
        <span>Request access</span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M7 17L17 7"/><path d="M7 7h10v10"/>
        </svg>
      </button>
    </form>

    <p id="status" class="auth-status" role="status"></p>

    <p class="auth-foot">
      Already a resident? <a href="/auth/signin.html">Sign in</a>
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/env.js"></script>
  <script src="/assets/supabase-client.js"></script>
  <script>
    const form = document.getElementById('signupForm');
    const status = document.getElementById('status');
    const button = form.querySelector('button[type="submit"]');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const full_name   = document.getElementById('full_name').value.trim();
      const unit_number = document.getElementById('unit_number').value.trim();
      const phone       = document.getElementById('phone').value.trim();
      const email       = document.getElementById('email').value.trim();
      if (!full_name || !unit_number || !phone || !email) {
        status.textContent = 'All fields are required.';
        return;
      }

      button.disabled = true;
      button.style.opacity = '0.6';
      status.textContent = 'Sending\u2026';

      // signInWithOtp with shouldCreateUser:true (default) creates the
      // auth user on first request. The user_metadata in `data` is read
      // by the handle_new_user trigger to populate the profile row with
      // status='pending'.
      const { error } = await window.sb.auth.signInWithOtp({
        email,
        options: {
          data: { full_name, unit_number, phone },
          emailRedirectTo: `${location.origin}/auth/callback.html`,
        },
      });

      button.disabled = false;
      button.style.opacity = '';

      if (error) {
        status.textContent = 'Couldn\u2019t request: ' + error.message;
      } else {
        status.textContent = 'Sent. Click the link in the email at ' + email + ' to confirm — then a board member will approve you.';
        button.querySelector('span').textContent = 'Sent ✓';
      }
    });
  </script>
</body>
</html>
