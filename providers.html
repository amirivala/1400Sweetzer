<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0c0a09" />
  <title>Providers · Sunset Penthouse</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..700,30..100;1,9..144,300..700,30..100&family=Geist+Mono:wght@400;500&family=Geist:wght@300;400;500;600&display=swap" />
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body class="page">

  <main class="page__container">
    <header class="page-header rise delay-1">
      <span class="page-header__kicker">Providers</span>
      <h1 class="page-header__title">Who to call.</h1>
      <p class="page-header__sub">
        Plumbers, electricians, locksmiths — vetted by the board over
        time. Tap a number to call.
      </p>
    </header>

    <div id="filterRow" class="chip-row" aria-label="Filter providers by category"></div>

    <section id="providerGrid" aria-live="polite">
      <div class="empty">
        <div class="empty__title">Loading…</div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/env.js"></script>
  <script src="/assets/supabase-client.js"></script>
  <script src="/assets/auth-guard.js"></script>
  <script src="/assets/page-shell.js"></script>
  <script src="/assets/dom.js"></script>
  <script>
    (async () => {
      const filterRow = document.getElementById('filterRow');
      const grid = document.getElementById('providerGrid');

      const { data: { session } } = await window.sb.auth.getSession();
      if (!session) return;

      const { data: providers, error } = await window.sb
        .from('providers')
        .select('id, name, category, phone, email, notes')
        .order('category', { ascending: true })
        .order('name', { ascending: true });

      if (error) {
        mount(grid,
          el('div', { class: 'empty' },
            el('div', { class: 'empty__title', text: 'Trouble loading providers' }),
            el('p', { class: 'empty__sub', text: error.message }),
          ));
        return;
      }

      if (!providers || providers.length === 0) {
        mount(grid,
          el('div', { class: 'empty' },
            el('div', { class: 'empty__title', text: 'No providers yet' }),
            el('p', {
              class: 'empty__sub',
              text: 'Once the board adds vetted services, they\u2019ll show up here.',
            }),
          ));
        return;
      }

      const cats = ['All', ...Array.from(new Set(providers.map((p) => p.category))).sort()];
      let active = 'All';

      const phoneIcon = () => {
        const NS = 'http://www.w3.org/2000/svg';
        const svg = document.createElementNS(NS, 'svg');
        svg.setAttribute('width', '14'); svg.setAttribute('height', '14');
        svg.setAttribute('viewBox', '0 0 24 24'); svg.setAttribute('fill', 'none');
        svg.setAttribute('stroke', 'currentColor'); svg.setAttribute('stroke-width', '2');
        svg.setAttribute('stroke-linecap', 'round'); svg.setAttribute('stroke-linejoin', 'round');
        svg.setAttribute('aria-hidden', 'true');
        const p = document.createElementNS(NS, 'path');
        p.setAttribute('d', 'M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.37 1.9.72 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.35 1.85.59 2.81.72A2 2 0 0 1 22 16.92z');
        svg.appendChild(p);
        return svg;
      };

      const renderCards = () => {
        const list = active === 'All'
          ? providers
          : providers.filter((p) => p.category === active);

        if (list.length === 0) {
          mount(grid,
            el('div', { class: 'empty' },
              el('div', { class: 'empty__title', text: 'No ' + active + ' providers yet' }),
              el('p', { class: 'empty__sub', text: 'Try a different category.' }),
            ));
          return;
        }

        grid.className = 'provider-grid';

        const cards = list.map((p, idx) => {
          const phoneHref = p.phone ? 'tel:' + String(p.phone).replace(/[^+\d]/g, '') : null;
          return el('article', {
              class: 'card provider-card liquid-glass rise',
              style: { animationDelay: `${0.05 + idx * 0.04}s` },
            },
            el('span', { class: 'provider-card__cat', text: p.category }),
            el('h2', { class: 'provider-card__name', text: p.name }),
            p.phone
              ? el('a', { class: 'provider-card__phone', href: phoneHref }, phoneIcon(), p.phone)
              : null,
            p.notes ? el('p', { class: 'provider-card__notes', text: p.notes }) : null,
          );
        });

        mount(grid, ...cards);
      };

      const renderChips = () => {
        const chips = cats.map((c) =>
          el('button', {
            type: 'button',
            class: 'chip',
            'aria-pressed': c === active ? 'true' : 'false',
            text: c,
            onclick: () => { active = c; renderChips(); renderCards(); },
          }));
        mount(filterRow, ...chips);
      };

      renderChips();
      renderCards();
    })();
  </script>
</body>
</html>
